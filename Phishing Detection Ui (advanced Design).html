<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Detector</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow: hidden;
}

/* Animated gradient background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #0f172a, #1e3a8a, #9333ea, #0f172a);
  animation: moveBg 15s infinite linear;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 450px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  font-size: 14px;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  font-size: 15px;
}

.bad {
  color: #f87171;
}

.good {
  color: #4ade80;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Phishing Email Detector</h2>

    <textarea id="email" placeholder="Paste email content here..."></textarea>

    <button onclick="analyze()">Analyze Email</button>

    <div id="result" class="result"></div>
  </div>
</div>

<script>
function analyze() {
  const text = document.getElementById('email').value.toLowerCase();
  const result = document.getElementById('result');

  let score = 0;

  const phishingWords = [
    'urgent','verify','login','password','bank','account','click here','limited time'
  ];

  phishingWords.forEach(word => {
    if (text.includes(word)) score++;
  });

  if (text.includes('http://')) score++;
  if (text.includes('@') && text.includes('.ru')) score++;

  if (score >= 3) {
    result.innerHTML = '<span class="bad">⚠ Phishing Detected</span>';
  } else {
    result.innerHTML = '<span class="good">✔ Looks Safe</span>';
  }
}
</script>

</body>
</html>
