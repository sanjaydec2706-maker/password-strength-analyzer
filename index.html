<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Password Analyzer</title>

  <!-- zxcvbn for real strength estimation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      width: 420px;
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .bar {
      height: 10px;
      border-radius: 6px;
      background: #334155;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .fill {
      height: 100%;
      width: 0%;
      transition: 0.4s ease;
    }

    .text {
      font-size: 14px;
      margin-top: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 12px;
      font-weight: bold;
      cursor: pointer;
      background: #22c55e;
    }

    .result {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .suggestion {
      margin-top: 10px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Pro Password Analyzer</h2>

    <input type="password" id="pwd" placeholder="Enter password" oninput="analyze()" />

    <div class="bar"><div id="fill" class="fill"></div></div>
    <div id="strength" class="text"></div>
    <div id="crack" class="text"></div>

    <div id="breach" class="text"></div>

    <button onclick="generatePassphrase()">Generate Secure Passphrase</button>
    <div id="suggestion" class="suggestion"></div>
  </div>

  <script>
    async function sha1(str) {
      const buffer = new TextEncoder().encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('').toUpperCase();
    }

    async function checkBreach(password) {
      const hash = await sha1(password);
      const prefix = hash.slice(0, 5);
      const suffix = hash.slice(5);

      const res = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`);
      const text = await res.text();

      const found = text.split('\n').find(line => line.startsWith(suffix));
      return found ? found.split(':')[1] : 0;
    }

    async function analyze() {
      const pwd = document.getElementById('pwd').value;
      const fill = document.getElementById('fill');
      const strength = document.getElementById('strength');
      const crack = document.getElementById('crack');
      const breach = document.getElementById('breach');

      if (!pwd) return;

      const result = zxcvbn(pwd);

      const score = result.score; // 0–4
      const percent = (score + 1) * 20;

      fill.style.width = percent + '%';

      const labels = ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
      strength.innerText = 'Strength: ' + labels[score];

      crack.innerText = 'Estimated crack time: ' + result.crack_times_display.offline_slow_hashing_1e4_per_second;

      // Breach check
      breach.innerText = 'Checking breaches...';
      try {
        const count = await checkBreach(pwd);
        if (count > 0) {
          breach.innerText = `⚠ Found in ${count} breaches`;
        } else {
          breach.innerText = 'Not found in known breaches';
        }
      } catch {
        breach.innerText = 'Breach check failed';
      }
    }

    function generatePassphrase() {
      const words = [
        'quantum','falcon','nebula','cipher','vector','matrix','shadow','orbit',
        'delta','phoenix','cosmic','signal','vertex','fusion','nova','echo'
      ];

      let pass = '';
      for (let i = 0; i < 4; i++) {
        pass += words[Math.floor(Math.random() * words.length)];
        if (i < 3) pass += '-';
      }

      pass += Math.floor(Math.random() * 1000);

      document.getElementById('suggestion').innerText = pass;
    }
  </script>
</body>
</html>
